logger:
  enable: true
  pretty_backtrace: true
  level: debug
  format: compact

server:
  port: 5590
  host: http://localhost
  middlewares:
    static:
      enable: true
      must_exist: true
      precompressed: false
      folder:
        uri: "/static"
        path: "assets/static"
    cors:
      enable: true
      allow_origins:
        - http://localhost:5590

database:
  uri: postgres://postgres:postgres@localhost:5432/rheumatology_assessment_development
  enable_logging: false
  connect_timeout: 500
  idle_timeout: 500
  min_connections: 1
  max_connections: 1
  auto_migrate: true
