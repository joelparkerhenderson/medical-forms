logger:
  enable: true
  level: warn
  format: compact

server:
  port: 5260
  host: http://localhost
  middlewares:
    cors:
      enable: true
      allow_origins:
        - http://localhost:5260

database:
  uri: postgres://localhost:5432/attention_deficit_assessment_tera_test
  enable_logging: false
  connect_timeout: 500
  idle_timeout: 500
  min_connections: 1
  max_connections: 1
  auto_migrate: true
  dangerously_truncate: true
