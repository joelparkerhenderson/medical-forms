<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinician Dashboard - Ergonomic Assessment</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <span class="header-title">Ergonomic Assessment -- Clinician Dashboard</span>
    </div>
  </header>

  <main class="container">
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="Search by NHS number, name, occupation, or finding...">
      <select id="risk-filter">
        <option value="">All Risk Levels</option>
        <option value="Negligible risk">Negligible</option>
        <option value="Low risk">Low</option>
        <option value="Medium risk">Medium</option>
        <option value="High risk">High</option>
        <option value="Very high risk">Very High</option>
      </select>
      <button id="clear-filters">Clear Filters</button>
    </div>

    <table class="patient-table">
      <thead>
        <tr>
          <th data-sort="nhsNumber">NHS Number</th>
          <th data-sort="patientName">Patient Name</th>
          <th data-sort="rebaScore">REBA Score</th>
          <th data-sort="riskLevel">Risk Level</th>
          <th data-sort="painSeverity">Pain</th>
          <th data-sort="keyFinding">Key Finding</th>
        </tr>
      </thead>
      <tbody id="patients-tbody">
        <tr><td colspan="6" style="text-align:center;color:#6b7280;padding:2rem;">Loading...</td></tr>
      </tbody>
    </table>

    <div class="patient-count" id="patient-count"></div>
  </main>

  <footer class="footer"><p>Ergonomic Assessment System &copy; 2026. For clinical use only.</p></footer>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
