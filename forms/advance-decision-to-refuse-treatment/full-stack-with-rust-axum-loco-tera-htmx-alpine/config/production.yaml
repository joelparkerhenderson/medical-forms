logger:
  enable: true
  pretty_backtrace: false
  level: info
  format: json

server:
  port: $PORT
  binding: 0.0.0.0
  host: $HOST
  middlewares:
    cors:
      enable: true
      allow_origins:
        - $FRONTEND_URL
      allow_methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allow_headers:
        - Content-Type
        - Authorization

database:
  uri: $DATABASE_URL
  enable_logging: false
  connect_timeout: 500
  idle_timeout: 500
  min_connections: 1
  max_connections: 10
  auto_migrate: true
  dangerously_truncate: false
  dangerously_recreate: false
