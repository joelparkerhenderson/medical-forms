<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinician Dashboard - Allergy Assessment</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <span class="header-title">Clinician Dashboard - Allergy Assessment</span>
    </div>
  </header>

  <main class="container">
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="Search by NHS number or name...">
      <select id="severity-filter">
        <option value="">All Severities</option>
        <option value="mild">Mild</option>
        <option value="moderate">Moderate</option>
        <option value="severe">Severe</option>
      </select>
      <select id="status-filter">
        <option value="">All Statuses</option>
        <option value="pending">Pending</option>
        <option value="reviewed">Reviewed</option>
        <option value="urgent">Urgent</option>
      </select>
      <select id="allergy-type-filter">
        <option value="">All Allergy Types</option>
        <option value="Drug">Drug</option>
        <option value="Food">Food</option>
        <option value="Environmental">Environmental</option>
      </select>
      <button id="clear-filters">Clear Filters</button>
    </div>

    <table class="patient-table">
      <thead>
        <tr>
          <th data-sort="nhsNumber">NHS Number</th>
          <th data-sort="patientName">Patient Name</th>
          <th data-sort="severityLevel">Severity</th>
          <th data-sort="allergenCount">Allergens</th>
          <th data-sort="primaryAllergyType">Primary Type</th>
          <th data-sort="hasAnaphylaxis">Anaphylaxis</th>
          <th data-sort="flagCount">Flags</th>
          <th data-sort="status">Status</th>
        </tr>
      </thead>
      <tbody id="patients-tbody">
        <tr><td colspan="8" style="text-align:center;color:#6b7280;padding:2rem;">Loading...</td></tr>
      </tbody>
    </table>

    <div class="patient-count" id="patient-count"></div>
  </main>

  <footer class="footer"><p>Allergy Assessment System &copy; 2026. For clinical use only.</p></footer>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
