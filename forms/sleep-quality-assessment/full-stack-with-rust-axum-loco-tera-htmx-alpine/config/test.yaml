logger:
  enable: true
  level: warn
  format: compact

server:
  port: 5610
  host: http://localhost
  middlewares:
    cors:
      enable: true
      allow_origins:
        - http://localhost:5610

database:
  uri: postgres://postgres:postgres@localhost:5432/sleep_quality_assessment_test
  enable_logging: false
  connect_timeout: 500
  idle_timeout: 500
  min_connections: 1
  max_connections: 1
  auto_migrate: true
  dangerously_truncate: true
