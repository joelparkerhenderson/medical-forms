<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinician Dashboard - Medical Records Release</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <span class="header-title">Clinician Dashboard</span>
    </div>
  </header>

  <main class="container">
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="Search by NHS number, name, or recipient...">
      <select id="status-filter">
        <option value="">All Statuses</option>
        <option value="draft">Draft</option>
        <option value="submitted">Submitted</option>
        <option value="approved">Approved</option>
        <option value="expired">Expired</option>
        <option value="revoked">Revoked</option>
      </select>
      <select id="completeness-filter">
        <option value="">All Completeness</option>
        <option value="complete">Complete</option>
        <option value="nearly-complete">Nearly Complete</option>
        <option value="incomplete">Incomplete</option>
      </select>
      <button id="clear-filters">Clear Filters</button>
    </div>

    <table class="patient-table">
      <thead>
        <tr>
          <th data-sort="nhsNumber">NHS Number</th>
          <th data-sort="patientName">Patient Name</th>
          <th data-sort="recipientName">Recipient</th>
          <th data-sort="status">Status</th>
          <th data-sort="completenessScore">Completeness</th>
          <th data-sort="submittedDate">Submitted</th>
        </tr>
      </thead>
      <tbody id="patients-tbody">
        <tr><td colspan="6" style="text-align:center;color:#6b7280;padding:2rem;">Loading...</td></tr>
      </tbody>
    </table>

    <div class="patient-count" id="patient-count"></div>
  </main>

  <footer class="footer"><p>Medical Records Release System &copy; 2026. For clinical use only.</p></footer>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
