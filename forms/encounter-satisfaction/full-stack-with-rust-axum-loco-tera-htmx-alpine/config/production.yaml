logger:
  enable: true
  level: info
  format: json

server:
  port: $PORT
  host: $HOST
  middlewares:
    cors:
      enable: true
      allow_origins:
        - $FRONTEND_URL

database:
  uri: $DATABASE_URL
  enable_logging: false
  connect_timeout: 5000
  idle_timeout: 5000
  min_connections: 1
  max_connections: 10
  auto_migrate: true
