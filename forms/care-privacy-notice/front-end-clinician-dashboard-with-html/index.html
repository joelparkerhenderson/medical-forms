<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinician Dashboard - Care Privacy Notice</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <span class="header-title">Care Privacy Notice &mdash; Clinician Dashboard</span>
    </div>
  </header>

  <main class="container">
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="Search by name or practice...">
      <select id="status-filter">
        <option value="">All Statuses</option>
        <option value="complete">Complete</option>
        <option value="incomplete">Incomplete</option>
      </select>
      <button id="clear-filters">Clear Filters</button>
    </div>

    <table class="patient-table">
      <thead>
        <tr>
          <th data-sort="patientName">Patient Name</th>
          <th data-sort="nhsNumber">NHS Number</th>
          <th data-sort="dateAcknowledged">Date Acknowledged</th>
          <th data-sort="status">Status</th>
          <th data-sort="practiceName">Practice Name</th>
        </tr>
      </thead>
      <tbody id="patients-tbody">
        <tr><td colspan="5" style="text-align:center;color:#6b7280;padding:2rem;">Loading...</td></tr>
      </tbody>
    </table>

    <div class="patient-count" id="patient-count"></div>
  </main>

  <footer class="footer"><p>Care Privacy Notice System &copy; 2026. For clinical use only.</p></footer>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
