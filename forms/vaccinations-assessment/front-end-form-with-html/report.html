<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaccinations Assessment Report</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="header-title">Vaccinations Assessment</a>
      <nav><a href="index.html">Home</a></nav>
    </div>
  </header>

  <main class="container main-content" id="report-content">
    <p style="text-align:center;color:#6b7280;">Loading report...</p>
  </main>

  <footer class="footer"><p>Vaccinations Assessment System &copy; 2026. For clinical use only.</p></footer>

  <script type="module">
    import { vaccinationLevelLabel, vaccinationLevelColor, formatDate, formatNhsNumber, childhoodScore, adultScore, consentScore } from './js/utils.js';

    const dataStr = sessionStorage.getItem('vaccinationData');
    const resultStr = sessionStorage.getItem('vaccinationResult');
    const container = document.getElementById('report-content');

    if (!dataStr || !resultStr) {
      container.innerHTML = '<div class="card" style="text-align:center"><h2>No Assessment Data</h2><p>Please complete the vaccination assessment first.</p><a href="index.html" class="btn btn-primary">Go to Assessment</a></div>';
    } else {
      const data = JSON.parse(dataStr);
      const result = JSON.parse(resultStr);
      renderReport(data, result);
    }

    function renderReport(data, result) {
      const colorClass = vaccinationLevelColor(result.vaccinationLevel);
      let html = '';

      // Status Banner
      html += '<div class="status-banner ' + colorClass + '">';
      html += '<h2>' + result.vaccinationScore + '% &mdash; ' + vaccinationLevelLabel(result.vaccinationLevel) + '</h2>';
      html += '<p>Generated ' + new Date(result.timestamp).toLocaleString() + '</p>';
      html += '</div>';

      // Dimension Scores
      const cs = childhoodScore(data);
      const as = adultScore(data);
      const cos = consentScore(data);
      html += '<div class="dimension-grid">';
      html += '<div class="dimension-card"><div class="score">' + (cs !== null ? cs + '%' : 'N/A') + '</div><div class="label">Childhood</div></div>';
      html += '<div class="dimension-card"><div class="score">' + (as !== null ? as + '%' : 'N/A') + '</div><div class="label">Adult</div></div>';
      html += '<div class="dimension-card"><div class="score">' + (cos !== null ? cos + '%' : 'N/A') + '</div><div class="label">Consent</div></div>';
      html += '</div>';

      // Flagged Issues
      if (result.additionalFlags && result.additionalFlags.length > 0) {
        html += '<div class="card"><h2>Flagged Issues for Clinician</h2>';
        for (const flag of result.additionalFlags) {
          const flagClass = 'flag-' + flag.priority;
          html += '<div class="flag-item ' + flagClass + '">';
          html += '<div class="flag-category">' + esc(flag.category) + ' (' + flag.priority + ')</div>';
          html += '<div class="flag-message">' + esc(flag.message) + '</div>';
          html += '</div>';
        }
        html += '</div>';
      }

      // Fired Rules
      if (result.firedRules && result.firedRules.length > 0) {
        html += '<div class="card"><h2>Vaccination Concerns (' + result.firedRules.length + ')</h2>';
        html += '<table class="rules-table"><thead><tr><th>ID</th><th>Category</th><th>Concern</th><th>Description</th></tr></thead><tbody>';
        for (const rule of result.firedRules) {
          html += '<tr><td>' + esc(rule.id) + '</td><td>' + esc(rule.category) + '</td>';
          html += '<td>' + esc(rule.concernLevel) + '</td>';
          html += '<td>' + esc(rule.description) + '</td></tr>';
        }
        html += '</tbody></table></div>';
      }

      // Patient Summary
      html += '<div class="card"><h2>Patient Summary</h2><dl class="summary-grid">';
      html += '<dt>Name</dt><dd>' + esc(data.patientInformation.patientName) + '</dd>';
      html += '<dt>DOB</dt><dd>' + formatDate(data.patientInformation.dateOfBirth) + '</dd>';
      html += '<dt>NHS Number</dt><dd>' + esc(formatNhsNumber(data.patientInformation.nhsNumber)) + '</dd>';
      html += '<dt>GP Practice</dt><dd>' + esc(data.patientInformation.gpPractice) + '</dd>';
      html += '</dl></div>';

      // Vaccination Details
      html += '<div class="card"><h2>Childhood Vaccinations</h2><dl class="summary-grid">';
      html += vaxRow('DTaP/IPV/Hib/HepB', data.childhoodVaccinations.dtapIpvHibHepb);
      html += vaxRow('Pneumococcal', data.childhoodVaccinations.pneumococcal);
      html += vaxRow('Rotavirus', data.childhoodVaccinations.rotavirus);
      html += vaxRow('Meningitis B', data.childhoodVaccinations.meningitisB);
      html += vaxRow('MMR', data.childhoodVaccinations.mmr);
      html += vaxRow('Hib/MenC', data.childhoodVaccinations.hibMenc);
      html += vaxRow('Pre-school Booster', data.childhoodVaccinations.preschoolBooster);
      html += '</dl></div>';

      html += '<div class="card"><h2>Adult Vaccinations</h2><dl class="summary-grid">';
      html += vaxRow('Td/IPV Booster', data.adultVaccinations.tdIpvBooster);
      html += vaxRow('HPV', data.adultVaccinations.hpv);
      html += vaxRow('Meningitis ACWY', data.adultVaccinations.meningitisAcwy);
      html += vaxRow('Influenza', data.adultVaccinations.influenzaAnnual);
      html += vaxRow('COVID-19', data.adultVaccinations.covid19);
      html += vaxRow('Shingles', data.adultVaccinations.shingles);
      html += vaxRow('Pneumococcal PPV23', data.adultVaccinations.pneumococcalPpv);
      html += '</dl></div>';

      // Action Buttons
      html += '<div class="action-buttons">';
      html += '<a href="index.html" class="btn btn-primary">New Assessment</a>';
      html += '<button class="btn btn-secondary" onclick="window.print()">Print Report</button>';
      html += '</div>';

      container.innerHTML = html;
    }

    function vaxRow(label, val) {
      const display = val === null ? 'N/A' : val === 0 ? 'Not Given' : val === 1 ? 'Partial' : 'Complete';
      return '<dt>' + esc(label) + '</dt><dd>' + display + '</dd>';
    }

    function esc(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }
  </script>
</body>
</html>
